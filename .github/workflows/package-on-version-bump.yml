# Builds AppImage + deb (Linux) and publishes a GitHub Release when package.json "version" changes on main.
name: Package on version bump

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.diff.outputs.build }}
      version: ${{ steps.diff.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: diff
        run: |
          set -euo pipefail
          CURR=$(node -p "require('./package.json').version")
          echo "version=$CURR" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Manual workflow_dispatch — building version $CURR."
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "No parent SHA; treating as first push — building."
            exit 0
          fi
          if ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Parent commit not in history; building."
            exit 0
          fi
          PREV=$(git show "$BEFORE:package.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Could not read previous version; building."
            exit 0
          fi
          if [ "$PREV" != "$CURR" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREV -> $CURR"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "package.json changed but version is still $CURR — skipping build."
          fi

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb

  release:
    needs: [check-version, build-linux]
    if: needs.check-version.outputs.build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Changelog
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTES="- Manual release rebuild"
          else
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              NOTES=$(git log --no-merges -n 40 --pretty=format:'- %s (%h)' HEAD)
            else
              NOTES=$(git log --no-merges --pretty=format:'- %s (%h)' "$BEFORE..HEAD" || true)
            fi
            if [ -z "$NOTES" ]; then
              NOTES="- (no commits in range)"
            fi
          fi
          {
            echo "## Changes"
            echo ""
            echo "$NOTES"
          } > release-notes.md
      - uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: release-assets
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.check-version.outputs.version }}"
          NAME="LiFE Nextcloud Sync ${{ needs.check-version.outputs.version }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Manual rerun: deleting existing release $TAG"
              gh release delete "$TAG" --yes --cleanup
            elif git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              echo "Manual rerun: deleting orphan tag $TAG"
              git push origin ":refs/tags/$TAG"
            fi
          fi
          echo "Creating release ${TAG}"
          mapfile -t ASSET_FILES < <(find release-assets -maxdepth 1 -type f | sort)
          if [ "${#ASSET_FILES[@]}" -eq 0 ]; then
            echo "No release asset files in release-assets/"
            ls -la release-assets || true
            exit 1
          fi
          printf 'Assets:\n'
          printf ' %s\n' "${ASSET_FILES[@]}"
          gh release create "$TAG" "${ASSET_FILES[@]}" \
            --title "$NAME" \
            --notes-file release-notes.md
