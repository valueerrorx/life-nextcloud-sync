# Manual: Linux (AppImage + deb) → artifact linux-dist
name: Package (Linux)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          ELECTRON_BUILDER_PUBLISH: never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
